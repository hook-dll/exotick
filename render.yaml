# Render.com Blueprint — always-on free hosting for exotick.
# Builds the existing production Dockerfile. Render terminates TLS and assigns
# an *.onrender.com URL. No credit card required for the free plan.
#
# IMPORTANT free-plan tradeoffs:
#   - No persistent disk. The SQLite DB lives on an ephemeral filesystem, so it
#     RESETS on every redeploy and every wake-from-idle. The admin user is
#     re-created from the env vars below on each boot, but any data entered
#     during a session is lost once the instance sleeps. Fine for a demo.
#   - Free instances sleep after ~15 min idle; the first request then takes
#     ~30-60s to wake (cold start).
#   - Render injects its own PORT — the app already honors process.env.PORT, so
#     PORT is intentionally NOT set here. EXOTICK_DATA_DIR stays at the
#     Dockerfile default (/data).

services:
  - type: web
    name: exotick
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXOTICK_ADMIN_USERNAME
        value: admin
      # Secret — not stored in the repo. Render prompts for it when you create
      # the Blueprint (sync:false). Pick something strong.
      - key: EXOTICK_ADMIN_PASSWORD
        sync: false
